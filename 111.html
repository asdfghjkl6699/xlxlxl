<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .current-player {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-indicator {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .player-black {
            background: radial-gradient(circle at 30% 30%, #444, #000);
        }

        .player-white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 2px solid #ccc;
        }

        .btn {
            padding: 10px 25px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 0;
            background: #DEB887;
            padding: 15px;
            border-radius: 10px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .cell {
            width: 30px;
            height: 30px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-right: 1px solid #8B4513;
            border-bottom: 1px solid #8B4513;
            box-sizing: border-box;
        }

        .cell:nth-child(15n)::before {
            border-right: none;
        }

        .cell:nth-last-child(-n+15)::before {
            border-bottom: none;
        }

        .cell:hover::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
        }

        .stone {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            position: relative;
            z-index: 1;
            animation: placeStone 0.2s ease;
        }

        .stone-black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
            box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.5);
        }

        .stone-white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid #ccc;
        }

        @keyframes placeStone {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .winning-stone {
            animation: winPulse 1s ease-in-out infinite;
        }

        @keyframes winPulse {
            0%, 100% {
                box-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700;
            }
            50% {
                box-shadow: 0 0 15px #FFD700, 0 0 25px #FFD700;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 28px;
            color: #333;
        }

        .winner-stone {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            margin: 0 auto 20px;
        }

        .score-panel {
            margin-top: 20px;
            display: flex;
            gap: 40px;
            justify-content: center;
        }

        .score-item {
            text-align: center;
        }

        .score-item span {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .score-item label {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>五子棋</h1>
        
        <div class="info-panel">
            <div class="current-player">
                <span>当前回合：</span>
                <div class="player-indicator player-black" id="currentPlayer"></div>
                <span id="playerName">黑方</span>
            </div>
            <button class="btn btn-primary" onclick="resetGame()">重新开始</button>
        </div>

        <div class="board" id="board"></div>

        <div class="score-panel">
            <div class="score-item">
                <span id="blackScore">0</span>
                <label>黑方胜</label>
            </div>
            <div class="score-item">
                <span id="whiteScore">0</span>
                <label>白方胜</label>
            </div>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2 id="winMessage"></h2>
            <div class="winner-stone" id="winnerStone"></div>
            <button class="btn btn-primary" onclick="closeModal(); resetGame()">再来一局</button>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 15;
        const board = [];
        let currentPlayer = 1; // 1=黑, 2=白
        let blackScore = 0;
        let whiteScore = 0;
        let gameOver = false;
        const winningStones = [];

        // 方向数组：水平、垂直、两个对角线
        const directions = [
            [1, 0],   // 水平
            [0, 1],   // 垂直
            [1, 1],   // 对角线 \
            [1, -1]   // 对角线 /
        ];

        function initBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                board[i] = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    board[i][j] = 0;
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    cell.addEventListener('click', handleCellClick);
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleCellClick(e) {
            if (gameOver) return;
            
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            
            if (board[row][col] !== 0) return;

            board[row][col] = currentPlayer;
            placeStone(row, col);

            if (checkWin(row, col)) {
                gameOver = true;
                showWinModal();
                updateScore();
                highlightWinningStones();
            } else if (checkDraw()) {
                gameOver = true;
                showDrawModal();
            } else {
                switchPlayer();
            }
        }

        function placeStone(row, col) {
            const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            const stone = document.createElement('div');
            stone.className = `stone ${currentPlayer === 1 ? 'stone-black' : 'stone-white'}`;
            cell.appendChild(stone);
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            const indicator = document.getElementById('currentPlayer');
            const playerName = document.getElementById('playerName');
            
            if (currentPlayer === 1) {
                indicator.className = 'player-indicator player-black';
                playerName.textContent = '黑方';
            } else {
                indicator.className = 'player-indicator player-white';
                playerName.textContent = '白方';
            }
        }

        function checkWin(row, col) {
            for (const [dx, dy] of directions) {
                let count = 1;
                const stones = [[row, col]];
                
                // 正方向
                for (let i = 1; i < 5; i++) {
                    const newRow = row + dx * i;
                    const newCol = col + dy * i;
                    if (isValidPosition(newRow, newCol) && board[newRow][newCol] === currentPlayer) {
                        count++;
                        stones.push([newRow, newCol]);
                    } else {
                        break;
                    }
                }
                
                // 反方向
                for (let i = 1; i < 5; i++) {
                    const newRow = row - dx * i;
                    const newCol = col - dy * i;
                    if (isValidPosition(newRow, newCol) && board[newRow][newCol] === currentPlayer) {
                        count++;
                        stones.push([newRow, newCol]);
                    } else {
                        break;
                    }
                }
                
                if (count >= 5) {
                    winningStones.push(...stones);
                    return true;
                }
            }
            return false;
        }

        function isValidPosition(row, col) {
            return row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE;
        }

        function checkDraw() {
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] === 0) return false;
                }
            }
            return true;
        }

        function highlightWinningStones() {
            for (const [row, col] of winningStones) {
                const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                const stone = cell.querySelector('.stone');
                if (stone) stone.classList.add('winning-stone');
            }
        }

        function showWinModal() {
            const modal = document.getElementById('winModal');
            const message = document.getElementById('winMessage');
            const stone = document.getElementById('winnerStone');
            
            if (currentPlayer === 1) {
                message.textContent = '🎉 黑方获胜！';
                stone.className = 'winner-stone stone-black';
            } else {
                message.textContent = '🎉 白方获胜！';
                stone.className = 'winner-stone stone-white';
            }
            
            modal.style.display = 'flex';
        }

        function showDrawModal() {
            const modal = document.getElementById('winModal');
            const message = document.getElementById('winMessage');
            const stone = document.getElementById('winnerStone');
            
            message.textContent = '🤝 平局！';
            stone.style.display = 'none';
            modal.style.display = 'flex';
        }

        function closeModal() {
            const modal = document.getElementById('winModal');
            modal.style.display = 'none';
            document.getElementById('winnerStone').style.display = 'block';
        }

        function updateScore() {
            if (currentPlayer === 1) {
                blackScore++;
                document.getElementById('blackScore').textContent = blackScore;
            } else {
                whiteScore++;
                document.getElementById('whiteScore').textContent = whiteScore;
            }
        }

        function resetGame() {
            gameOver = false;
            currentPlayer = 1;
            winningStones.length = 0;
            
            // 重置玩家指示器
            const indicator = document.getElementById('currentPlayer');
            const playerName = document.getElementById('playerName');
            indicator.className = 'player-indicator player-black';
            playerName.textContent = '黑方';
            
            closeModal();
            initBoard();
        }

        // 初始化游戏
        initBoard();
    </script>
</body>
</html>
